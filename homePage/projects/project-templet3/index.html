<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shane Vieira Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/baguetteBox.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="navbar">
            <a href="../../"><h1>Shane Vieira</h1></a>
            </div>
            <div class="nav">
                <button class="hamburger">☰</button>
                <ul class="nav-menu">
                    <li> <a href="../../#about-section">About</a> </li>
                    <li> <a href="../../#portfolio-section">Work</a> </li>
                    <li> <a href="../../#contact-section">Contact</a> </li>
                </ul>
            </div>



        </nav>
    </header>
    <main>
        <section class="about-section" id="about-section">
            <div class="about-content">
                <h2>3D Renders</h2>
                <p></p>
            </div>
        </section>
        <section class="portfolio-section" id="portfolio-section">
            <div class="portfolio-content">
                <div class="flex-container-grid">
                    <div class="portfolio-item flex-item-grid">
                        <a href="../../images/clock.png" data-caption="Alarm Clock"><img src="../../images/clock.png" alt="clock image"></a>
                        <h3>Alarm Clock</h3>
                        <p>This was the first item that I made using blender </p>
                    </div>
                    <div class="portfolio-item flex-item-grid">
                        <a href="../../images/train.png" data-caption="Toy Train"><img src="../../images/train.png" alt="toy train"></a>
                        <h3>Toy Train</h3>
                        <p>I wanted to see if I could make an item out of basic shapes</p>
                    </div>
                    <div class="portfolio-item flex-item-grid">
                        <a href="../../images/knight.png" data-caption="Chibi Knight"><img src="../../images/knight.png" alt="Knight armor"></a>
                        <h3>Chibi Knight</h3>
                        <p> This was my experiment with clothing/armor </p>
                    </div>
                    <div class="portfolio-item flex-item-grid">
                        <a href="../../images/3drender1.png" data-caption="First Render"><img src="../../images/3drender1.png" alt="Portrate of Salvador Dali"></a>
                        <h3>First Render</h3>
                        <p> </p>

        <div class="social-links">

        </div>

    <script src="js/hamburger.js"></script>
    <script src="js/baguetteBox.js"></script>
    <script>
        baguetteBox.run(".flex-container-grid",{
            captions: true
        })
    </script>

</html>
